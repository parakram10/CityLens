<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CityLens — Mumbai street-condition survey</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/app.css">
</head>
<body>
<div class="app" id="appRoot" style="display:none">
  <aside class="sidebar">
    <div class="brand"><div class="mark"></div><div><b>CityLens</b><span>Mumbai · BMC</span></div></div>
    <div class="navgroup" id="navgroup-spatial">
      <div class="lbl">Spatial view</div>
      <nav class="nav" id="nav-spatial">
        <a data-view="city"><span class="ic">◉</span> City overview <span class="ct" id="ct-city"></span></a>
        <a data-view="wards"><span class="ic">▦</span> Wards <span class="ct">24</span></a>
        <a data-view="ward" id="nav-myward"><span class="ic">▦</span> My ward</a>
        <a data-view="street"><span class="ic">↔</span> Streets &amp; corridors</a>
        <a data-view="fleet"><span class="ic">▤</span> Fleet &amp; replay <span class="ct" id="ct-bus"></span></a>
      </nav>
    </div>
    <div class="navgroup" id="navgroup-cat">
      <div class="lbl">By category</div>
      <nav class="nav" id="nav-cat">
        <a data-view="cat" data-type="pothole"><span class="ic" style="color:var(--pothole)">●</span> Potholes <span class="ct" id="ct-pothole"></span></a>
        <a data-view="cat" data-type="garbage_pile"><span class="ic" style="color:var(--garbage)">●</span> Sanitation <span class="ct" id="ct-garbage_pile"></span></a>
        <a data-view="cat" data-type="waterlogging"><span class="ic" style="color:var(--water)">●</span> Waterlogging <span class="ct" id="ct-waterlogging"></span></a>
        <a data-view="cat" data-type="street_obstruction"><span class="ic" style="color:var(--obstruction)">●</span> Obstructions <span class="ct" id="ct-street_obstruction"></span></a>
      </nav>
    </div>
    <div class="navgroup">
      <div class="lbl">Field crew</div>
      <nav class="nav" id="nav-crew">
        <a data-view="crew"><span class="ic">▣</span> Crew info <span class="ct" id="ct-crew"></span></a>
        <a data-view="performance"><span class="ic">★</span> Performance <span class="ct" id="ct-performance"></span></a>
      </nav>
    </div>
    <div class="sensing"><div><span class="dot"></span><b id="sensing-n"></b></div><small id="sensing-sub">passes logged today</small></div>
  </aside>

  <div class="main">
    <div class="header">
      <div>
        <div class="crumb" id="crumb"></div>
        <div class="h-title" id="h-title"></div>
        <div class="h-sub" id="h-sub"></div>
      </div>
      <div class="live"><span class="dot"></span> LIVE</div>
      <div class="scorechip" id="scorechip">City health <span class="v"></span></div>
      <div class="userchip" id="userchip"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="scrim" id="scrim"></div>
<div class="drawer" id="drawer"></div>
<div class="cmodal" id="crewModal"></div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
